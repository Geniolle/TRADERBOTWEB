services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    working_dir: /workspace/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
      APP_ENV: development
      APP_DEBUG: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      LOG_LEVEL: INFO
      TIMEZONE: Europe/Lisbon
      MARKET_DATA_PROVIDER: binance
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      TWELVEDATA_BASE_URL: https://api.twelvedata.com
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_BASE_URL: https://api.binance.com
      BINANCE_TRADING_API_KEY: ${BINANCE_TRADING_API_KEY:-}
      BINANCE_TRADING_API_SECRET: ${BINANCE_TRADING_API_SECRET:-}
      BINANCE_TRADING_BASE_URL: ${BINANCE_TRADING_BASE_URL:-https://testnet.binance.vision}
      BINANCE_TRADING_REQUIRE_TESTNET: ${BINANCE_TRADING_REQUIRE_TESTNET:-true}
      DATABASE_URL: sqlite:////data/market_research_lab.db
      STAGE_TEST_RUN_COMMAND: python -m app.stage_tests.runner
      STAGE_TEST_AUTO_ORDER_ENABLED: "false"
      STAGE_TEST_AUTO_ORDER_MIN_CONFIRMATION_SCORE: "70"
      STAGE_TEST_AUTO_ORDER_MAX_ORDERS_PER_RUN: "1"
      STAGE_TEST_AUTO_ORDER_TEST_MODE: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CANDLE_CACHE_ENABLED: "true"
      CANDLE_CACHE_SYNC_ON_READ: "true"
      CANDLE_CACHE_RECONCILE_BARS: "3"
      CANDLES_BOOTSTRAP_LIMIT_INTRADAY: "500"
      CANDLES_BOOTSTRAP_LIMIT_DAILY: "120"
      CANDLES_GAP_FILL_MAX_BARS: "5000"
      PROVIDER_QUOTA_COOLDOWN_MINUTES: "60"
    volumes:
      - ./backend:/workspace/backend
      - C:/workspace-db/trader-bot-web:/data
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile.dev
    working_dir: /workspace/web
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: ""
      VITE_API_WS_BASE_URL: ""
      VITE_CHART_STRATEGY_HIGHLIGHT_MIN_SCORE: "80"
      VITE_REALTIME_AUTO_ORDER_ENABLED: "true"
      VITE_REALTIME_AUTO_ORDER_MIN_SCORE: "100"
      VITE_REALTIME_AUTO_ORDER_QUOTE_QTY: "20"
      VITE_REALTIME_AUTO_ORDER_MAX_LOG_ITEMS: "60"
    volumes:
      - ./web:/workspace/web
      - web_node_modules:/workspace/web/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  web_node_modules:
